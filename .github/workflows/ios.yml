name: iOS Build

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      HAS_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      # ── Cache ─────────────────────────────────────────────────────────────────
      # Three separate caches so a change in one doesn't bust the others.
      # .konan is the Kotlin/Native toolchain (~600 MB) — the most expensive
      # thing to re-download on a cold run.

      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Xcode ─────────────────────────────────────────────────────────────────
      - name: Select latest Xcode
        run: |
          XCODE=$(ls -1d /Applications/Xcode*.app 2>/dev/null | sort -r | head -1)
          echo "Using Xcode: $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      # ── Kotlin/Native compilation ─────────────────────────────────────────────
      # Run as a standalone Gradle step so compiler errors are readable.
      # xcodebuild's run-script phase re-uses this cached output.

      - name: Compile Kotlin/Native (all iOS targets)
        run: |
          ./gradlew \
            :app:compileKotlinIosSimulatorArm64 \
            :app:compileKotlinIosX64 \
            :app:compileKotlinIosArm64 \
            --stacktrace

      # ── Xcode build ───────────────────────────────────────────────────────────

      - name: Build Xcode project (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/xcode_build.log
          tail -40 /tmp/xcode_build.log
          grep -q "BUILD SUCCEEDED" /tmp/xcode_build.log

      # ── Unsigned device IPA (always) ──────────────────────────────────────────
      # Builds for real hardware, skips signing. Sideloadly on Windows can
      # re-sign this IPA with an Apple ID and install over USB — no Mac needed.

      - name: Build unsigned device IPA
        run: |
          set -o pipefail
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CONFIGURATION_BUILD_DIR=/tmp/device-build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            2>&1 | tee /tmp/xcode_device.log
          tail -40 /tmp/xcode_device.log
          grep -q "BUILD SUCCEEDED" /tmp/xcode_device.log
          # Wrap .app in IPA payload structure
          mkdir -p /tmp/Payload
          APP=$(find /tmp/device-build -maxdepth 1 -name "*.app" | head -1)
          cp -r "$APP" /tmp/Payload/
          cd /tmp && zip -qr ProgMetronome-unsigned.ipa Payload/

      - name: Upload unsigned device IPA
        uses: actions/upload-artifact@v4
        with:
          name: ProgMetronome-unsigned-${{ github.run_number }}
          path: /tmp/ProgMetronome-unsigned.ipa
          retention-days: 30

      # ── Device IPA (only when signing secrets are provided) ───────────────────

      - name: Import certificate and provisioning profile
        if: env.HAS_CERT == 'true'
        env:
          CERTIFICATE_P12:      ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD:    ${{ github.run_id }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          echo "$PROVISIONING_PROFILE" | base64 --decode > profile.mobileprovision

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Archive for device
        if: env.HAS_CERT == 'true'
        run: |
          set -o pipefail
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/iosApp.xcarchive \
            2>&1 | tail -20

      - name: Export IPA
        if: env.HAS_CERT == 'true'
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath build/iosApp.xcarchive \
            -exportOptionsPlist iosApp/ExportOptions.plist \
            -exportPath build/iosApp-export \
            2>&1 | tail -20

      - name: Upload IPA
        if: env.HAS_CERT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ProgMetronome-${{ github.run_number }}.ipa
          path: build/iosApp-export/*.ipa
          retention-days: 30

      # ── Always upload simulator build ─────────────────────────────────────────
      - name: Upload simulator build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ProgMetronome-simulator-${{ github.run_number }}
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/Products/Debug-iphonesimulator/iosApp.app
          retention-days: 14
          if-no-files-found: warn
